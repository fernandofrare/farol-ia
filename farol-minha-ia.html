// ── API ───────────────────────────────────────────────────────────────────────
async function claude(prompt) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]}),
  });
  const d = await r.json();
  return d.content?.[0]?.text || "";
}

}

  return (
    <div>
      {items.map((it,i) => (
        <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6,background:C.bg3,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px"}}>

function ScheduleField({value, onChange}) {
  const def = value || Object.fromEntries(DAYS.map((d,i)=>[d,{on:i<5,s:"09:00",e:i<5?"18:00":"13:00"}]));
  const upd = (day,k,v) => onChange({...def,[day]:{...def[day],[k]:v}});
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:6}}>
      {DAYS.map(d=>(
        <div key={d} style={{background:C.bg3,border:`1px solid ${C.border}`,borderRadius:6,padding:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
            <span style={{fontSize:11,fontWeight:600,color:C.text2}}>{d}</span>
            <Sw on={def[d].on} onChange={()=>upd(d,"on",!def[d].on)}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,opacity:def[d].on?1:.3,transition:"opacity .18s"}}>
            <input type="time" value={def[d].s} onChange={e=>upd(d,"s",e.target.value)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 5px",fontSize:11,color:C.text,fontFamily:"monospace",flex:1,outline:"none"}}/>
            <span style={{fontSize:10,color:C.text3}}>—</span>
            <input type="time" value={def[d].e} onChange={e=>upd(d,"e",e.target.value)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 5px",fontSize:11,color:C.text,fontFamily:"monospace",flex:1,outline:"none"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

function is24h(h) {
  if(!h) return false;
  return DAYS.every(d=>h[d]?.on && h[d]?.s==="00:00" && h[d]?.e==="23:59");
}

function TextareaWithReview({value, onChange, hint, tone}) {
  const [rev,setRev]=useState(null);
  const [loading,setLoading]=useState(false);
  const doReview = async () => {
    if(!value?.trim()) return;
    setLoading(true);
    try {
      const td={formal:"formal e profissional, sem emojis",neutro:"neutro e amigável, emojis com moderação",descontraido:"descontraído e informal, use emojis"}[tone]||"neutro";
      const r = await claude(`Reescreva o texto corrigindo erros de português, ortografia e pontuação. Mantenha o mesmo significado. Tom: ${td}. Responda APENAS com o texto revisado.\n\nTexto: "${value}"`);
      setRev(r.trim());
    } catch{}
    setLoading(false);
  };
  return (
    <div>
      <textarea value={value||""} onChange={e=>{onChange(e.target.value);setRev(null);}} placeholder={hint} style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:5,padding:"9px 12px",fontSize:12,color:C.text,outline:"none",fontFamily:"inherit",resize:"vertical",minHeight:68,lineHeight:1.6}}/>
      {(value||"").trim().length>10 && !rev && (
        <BtnOutline onClick={doReview} disabled={loading} style={{marginTop:6,fontSize:10,padding:"5px 11px"}}>
          {loading?<><Spinner/>Revisando...</>:"✦ Revisar com IA"}
        </BtnOutline>
      )}
      {rev && <ReviewBox text={rev} onAccept={()=>{onChange(rev);setRev(null);}} onDismiss={()=>setRev(null)}/>}
    </div>
  );
}

function buildOffHoursMsg(horario, tone) {
  if(!horario) return "";
  const activeDays = DAYS.filter(d => horario[d]?.on);
  if(!activeDays.length) return "";

  // Group consecutive days with same hours
  const groups = [];
  let i = 0;
  while(i < activeDays.length) {
    const day = activeDays[i];
    const h = horario[day];
    let j = i + 1;
    while(j < activeDays.length) {
      const next = activeDays[j];
      const nh = horario[next];
      const consecutive = DAYS.indexOf(next) === DAYS.indexOf(activeDays[j-1]) + 1;
      if(consecutive && nh.s === h.s && nh.e === h.e) j++;
      else break;
    }
    if(j - i >= 2) {
      groups.push(`de ${activeDays[i]} a ${activeDays[j-1]}, das ${h.s} às ${h.e}`);
    } else {
      for(let k=i;k<j;k++) {
        const d = activeDays[k];
        groups.push(`${d}, das ${horario[d].s} às ${horario[d].e}`);
      }
    }
    i = j;
  }

  const schedule = groups.join("; ");
  const nextOpen = activeDays[0] ? `${activeDays[0]} às ${horario[activeDays[0]].s}` : "na próxima janela de atendimento";

  if(tone === "formal") return `Prezado cliente,\n\nNo momento estamos fora do horário de atendimento.\n\nNosso atendimento funciona ${schedule}.\n\nSua mensagem foi registrada e o atendimento será iniciado automaticamente assim que a próxima janela abrir — ${nextOpen}.\n\nAgradecemos sua compreensão.`;
  if(tone === "descontraido") return `Oi! 😊 No momento estamos fora do horário, mas não se preocupe!\n\nAtendemos ${schedule}.\n\nGuardamos sua mensagem aqui e assim que o atendimento abrir — ${nextOpen} — te chamamos automaticamente, tá? 🚀`;
  return `Olá! No momento estamos fora do horário de atendimento.\n\nAtendemos ${schedule}.\n\nSua mensagem foi registrada e o atendimento será retomado automaticamente assim que a próxima janela abrir — ${nextOpen}.\n\nObrigado pela compreensão! 😊`;
}

function MultiSelect({opts, value, onChange, no=[]}) {
  const sel = value || [];
  const toggle = (opt) => {
    if(no.includes(opt)) { onChange([opt]); return; }
    const cur = sel.filter(s=>!no.includes(s));
    onChange(sel.includes(opt) ? cur.filter(s=>s!==opt) : [...cur, opt]);
  };
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
      {opts.map(opt=><Pill key={opt} active={sel.includes(opt)} onClick={()=>toggle(opt)}>{opt}</Pill>)}
    </div>
  );
}

// ── GAPS CHECKER ──────────────────────────────────────────────────────────────
function GapsChecker({answers, segment}) {
  const qs = QUESTIONS[segment]||[];
  const gaps = [];
  qs.filter(q=>q.req).forEach(q=>{
    const v=answers[q.id];
    const empty=!v||(typeof v==="string"&&!v.trim())||(Array.isArray(v)&&!v.filter(x=>x.name||x).length);
    if(empty) gaps.push(q.label);
  });
  if(!(answers.pagamento?.length>0)) gaps.push("Formas de pagamento");
  if(!gaps.length) return (
    <div style={{display:"flex",alignItems:"flex-start",gap:10,background:C.greenDim,border:`1px solid ${C.greenBorder}`,borderRadius:6,padding:"10px 12px"}}>
      <span>✅</span>
      <div><div style={{fontSize:12,fontWeight:600,color:C.text}}>Treinamento completo</div><div style={{fontSize:11,color:C.text3,marginTop:1}}>Todas as informações essenciais estão preenchidas.</div></div>
    </div>
  );
  return gaps.map((g,i)=>(
    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,background:C.redDim,border:`1px solid ${C.redBorder}`,borderRadius:6,padding:"10px 12px",marginBottom:7}}>
      <span style={{fontSize:13}}>⚠️</span>
      <div><div style={{fontSize:12,fontWeight:600,color:C.text}}>{g} não preenchido</div><div style={{fontSize:11,color:C.text3,marginTop:1}}>A IA não conseguirá responder perguntas sobre este tema.</div></div>
    </div>
  ));
}

// ── PREVIEW CHAT ──────────────────────────────────────────────────────────────
function PreviewChat({answers, tone, assistantConfig}) {
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [inited,setInited]=useState(false);
  const ref=useRef(null);

  const name = assistantConfig?.type==="menu" && assistantConfig?.useCustomName && assistantConfig?.assistantName ? assistantConfig.assistantName : "Assistente";
  const toneDesc = {formal:"formal e profissional, sem emojis",neutro:"neutro e amigável, emojis com moderação",descontraido:"descontraído e informal, use emojis"}[tone]||"neutro";

  const buildCtx = () => {
    const p=[];
    if(answers.nome) p.push(`Negócio: ${answers.nome}`);
    if(answers.servicos?.length) p.push(`Serviços: ${answers.servicos.filter(s=>s.name).map(s=>`${s.name}${s.price?` — R$${s.price}`:""}`).join(", ")}`);
    if(answers.horario){const d=Object.entries(answers.horario).filter(([,v])=>v.on).map(([d,v])=>`${d} ${v.s}–${v.e}`);if(d.length)p.push(`Horários: ${d.join(", ")}`);}
    if(answers.pagamento?.length) p.push(`Pagamento: ${answers.pagamento.join(", ")}`);
    if(answers.cancelamento) p.push(`Política: ${answers.cancelamento}`);
    if(answers.fora) p.push(`Fora do horário: ${answers.fora}`);
    return p.join("\n");
  };

  const send = async () => {
    if(!input.trim()||loading) return;
    const txt=input.trim(); setInput("");
    const newMsgs=[...msgs,{dir:"in",text:txt}];
    setMsgs(newMsgs); setLoading(true);
    try {
      const hist=newMsgs.map(m=>`${m.dir==="in"?"Cliente":name}: ${m.text}`).join("\n");
      const r = await claude(`Você é ${name}, assistente virtual para:\n${buildCtx()}\n\nTom: ${toneDesc}\n\nHistórico:\n${hist}\n\nResponda a última mensagem. Máximo 3 linhas. Apenas a mensagem.`);
      setMsgs(m=>[...m,{dir:"out",text:r.trim()}]);
    } catch { setMsgs(m=>[...m,{dir:"out",text:"Erro. Tente novamente."}]); }
    setLoading(false);
  };

  useEffect(()=>{if(!inited&&answers.boas_vindas){setMsgs([{dir:"out",text:answers.boas_vindas}]);setInited(true);}},[answers.boas_vindas]);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  return (
    <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
      <div style={{background:C.bg3,borderBottom:`1px solid ${C.border}`,padding:"9px 14px",display:"flex",alignItems:"center",gap:7}}>
        {["#ef4444","#f5a623","#22c55e"].map(col=><div key={col} style={{width:8,height:8,borderRadius:"50%",background:col}}/>)}
        <span style={{fontSize:11,color:C.text3,fontWeight:600}}>Prévia · {name} · {TONES.find(t=>t.id===tone)?.label}</span>
      </div>
      <div style={{padding:14,display:"flex",flexDirection:"column",gap:7,maxHeight:280,overflowY:"auto"}}>
        {!msgs.length && <div style={{textAlign:"center",color:C.text3,fontSize:12,padding:"20px 0"}}>Configure a mensagem de boas-vindas para ver a prévia</div>}
        {msgs.map((m,i)=>(
          <div key={i} style={{alignSelf:m.dir==="in"?"flex-start":"flex-end",maxWidth:"72%"}}>
            <div style={{padding:"8px 11px",borderRadius:9,fontSize:12,lineHeight:1.6,fontWeight:500,background:m.dir==="in"?C.bg3:C.amberDim,border:m.dir==="out"?`1px solid ${C.amberBorder}`:"none",color:C.text,borderTopLeftRadius:m.dir==="in"?2:9,borderTopRightRadius:m.dir==="out"?2:9}}>{m.text}</div>
            <div style={{fontSize:9,color:C.text3,marginTop:2,textAlign:m.dir==="out"?"right":"left",fontFamily:"monospace"}}>{m.dir==="out"?name:"Cliente"} · agora</div>
          </div>
        ))}
        {loading && (
          <div style={{alignSelf:"flex-end"}}>
            <div style={{padding:"8px 11px",borderRadius:9,fontSize:12,background:C.amberDim,border:`1px solid ${C.amberBorder}`,display:"flex",alignItems:"center",gap:6}}>
              <Spinner/><span style={{fontSize:11,color:C.text3}}>digitando...</span>
            </div>
          </div>
        )}
        <div ref={ref}/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:7,padding:"9px 14px",borderTop:`1px solid ${C.border}`,background:C.bg3}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Simule uma mensagem de cliente..." style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,padding:"7px 11px",fontSize:12,color:C.text,outline:"none",fontFamily:"inherit"}}/>
        <button onClick={send} style={{width:30,height:30,background:C.amber,border:"none",borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#fff" strokeWidth="2"><path d="M14 8L2 2l2 6-2 6z"/></svg>
        </button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [segment,setSegment]=useState(null);
  const [tone,setTone]=useState("neutro");
  const [assistant,setAssistant]=useState({type:"humanizado",useCustomName:false,gender:"Mulher",assistantName:"",selectedPresets:[],customItems:[]});
  const [answers,setAnswers]=useState({});
  const [collectData,setCollectData]=useState(false);
  const [dataFields,setDataFields]=useState([]);
  const [dataTiming,setDataTiming]=useState("Após a primeira mensagem");
  const [tab,setTab]=useState("config");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  // Reset assistant presets when segment changes
  const handleSegmentChange = (seg) => {
    setSegment(seg);
    setAnswers({});
    setAssistant(a=>({...a, selectedPresets:[], customItems:[]}));
  };

  const qs = segment ? QUESTIONS[segment] : [];
  const filled = qs.filter(q=>{const v=answers[q.id];if(!v)return false;if(typeof v==="string")return v.trim().length>0;if(Array.isArray(v))return v.filter(x=>x.name||x).length>0;return typeof v==="object"&&Object.keys(v).length>0;}).length;
  const progress = qs.length ? Math.round((filled/qs.length)*100) : 0;
  const setAns = (id,val) => setAnswers(a=>({...a,[id]:val}));

  const save = async () => {
    setSaving(true);
    await new Promise(r=>setTimeout(r,1200));
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  };

  const renderField = (q) => {
    const val = answers[q.id];
    if(q.type==="text") return <input value={val||""} onChange={e=>setAns(q.id,e.target.value)} placeholder={q.hint} style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:5,padding:"9px 12px",fontSize:12,color:C.text,outline:"none",fontFamily:"inherit"}}/>;
    if(q.type==="textarea") return <TextareaWithReview value={val} onChange={v=>setAns(q.id,v)} hint={q.hint} tone={tone}/>;
    if(q.type==="schedule") return <ScheduleField value={val} onChange={v=>setAns(q.id,v)}/>;
    if(q.type==="services") return <ServiceRows value={val} onChange={v=>setAns(q.id,v)} hint={q.hint}/>;
    if(q.type==="docs") return <DocsField value={val} onChange={v=>setAns(q.id,v)}/>;
    if(q.type==="off_hours") return <OffHoursField value={val} onChange={v=>setAns(q.id,v)} horario={answers.horario} tone={tone}/>;
    if(q.type==="checks") return (
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {q.opts.map(opt=>{const active=(val||[]).includes(opt);return <Pill key={opt} active={active} onClick={()=>{const cur=val||[];setAns(q.id,active?cur.filter(x=>x!==opt):[...cur,opt]);}}>{opt}</Pill>;})}
      </div>
    );
    if(q.type==="multi") return <MultiSelect opts={q.opts} value={val} onChange={v=>setAns(q.id,v)} no={q.no}/>;
    if(q.type==="radio") return (
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {q.opts.map(opt=><Pill key={opt} active={val===opt} onClick={()=>setAns(q.id,opt)}>{opt}</Pill>)}
      </div>
    );
    if(q.type==="welcome") return <WelcomeField value={val} onChange={v=>setAns(q.id,v)} tone={tone} collectData={collectData} onCollectData={setCollectData} dataFields={dataFields} onDataFields={setDataFields} timing={dataTiming} onTiming={setDataTiming}/>;
    return null;
  };

  const tabBtn = (id, label) => (
    <button onClick={()=>(id==="preview"?segment:true)&&setTab(id)} style={{padding:"6px 16px",background:tab===id?C.amberDim:"none",border:`1px solid ${tab===id?C.amberBorder:C.border}`,borderRadius:5,fontSize:11,fontWeight:600,color:tab===id?C.amber:C.text3,cursor:"pointer",opacity:id==="preview"&&!segment?0.5:1}}>
      {label}
    </button>
  );

  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"0 24px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,height:28,background:C.amberDim,border:"1px solid rgba(245,166,35,.2)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg viewBox="0 0 36 46" fill="none" width="14" height="18"><rect x="15" y="20" width="6" height="18" rx="3" fill="#f5a623" opacity=".4"/><rect x="8" y="13" width="20" height="9" rx="4" fill="#f5a623" opacity=".7"/><path d="M18 3 Q28 13 8 13 Q18 13 18 3Z" fill="#f5a623"/><path d="M18 3 Q8 13 28 13 Q18 13 18 3Z" fill="#f5a623" opacity=".7"/><circle cx="18" cy="8" r="3.5" fill="#f5a623"/></svg>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.white}}>Farol IA</div>
            <div style={{fontSize:9,color:C.text3,letterSpacing:"1.5px",textTransform:"uppercase"}}>Minha IA — Configuração</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>{tabBtn("config","Configurar")}{tabBtn("preview","Prévia da IA")}</div>
      </div>

      {/* Body */}
      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 24px 80px"}}>

        {tab==="config" && <>

          {/* 1. SEGMENTO */}
          <Card>
            <CardHd label="1 · Segmento do negócio"/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
              {SEGMENTS.map(sg=>(
                <div key={sg.id} onClick={()=>handleSegmentChange(sg.id)} style={{padding:"12px 10px",background:segment===sg.id?C.amberDim:C.bg3,border:`1px solid ${segment===sg.id?C.amberBorder:C.border}`,borderRadius:7,cursor:"pointer",textAlign:"center",transition:"all .18s"}}>
                  <div style={{fontSize:22,marginBottom:5}}>{sg.icon}</div>
                  <div style={{fontSize:12,fontWeight:600,color:segment===sg.id?C.amber:C.text2}}>{sg.label}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* 2. ASSISTENTE */}
          <AssistantConfig segment={segment} config={assistant} onChange={setAssistant}/>

          {/* 3. TOM */}
          <Card>
            <CardHd label="3 · Tom de atendimento"/>
            <div style={{display:"flex",gap:6}}>
              {TONES.map(t=>(
                <div key={t.id} onClick={()=>setTone(t.id)} style={{flex:1,padding:"10px 8px",background:tone===t.id?C.amberDim:C.bg3,border:`1px solid ${tone===t.id?C.amberBorder:C.border}`,borderRadius:6,cursor:"pointer",textAlign:"center",transition:"all .18s"}}>
                  <div style={{fontSize:12,fontWeight:600,color:tone===t.id?C.amber:C.text,marginBottom:2}}>{t.label}</div>
                  <div style={{fontSize:10,color:C.text3}}>{t.ex}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* 4. INFORMAÇÕES */}
          {segment && <>
            {/* Progress */}
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.text3,fontWeight:600,marginBottom:5}}>
                <span>Preenchimento do treinamento</span>
                <strong style={{color:C.amber}}>{progress}%</strong>
              </div>
              <div style={{height:3,background:C.bg4,borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,#c47d0a,${C.amber})`,borderRadius:2,transition:"width .4s ease"}}/>
              </div>
            </div>

            <Card>
              <CardHd label="4 · Informações do negócio" sub="* campos obrigatórios"/>
              {qs.map(q=>(
                <div key={q.id} style={{marginBottom:14}}>
                  <FieldLabel req={q.req}>{q.label}</FieldLabel>
                  {renderField(q)}
                </div>
              ))}
            </Card>

            {/* 5. GAPS */}
            <Card>
              <CardHd label="5 · Verificação de lacunas"/>
              <GapsChecker answers={answers} segment={segment}/>
            </Card>

            {/* Save */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <BtnPrimary onClick={save} disabled={saving} style={{padding:"10px 24px",fontSize:12}}>
                {saving?<><Spinner/>Salvando...</>:saved?"✓ Treinamento atualizado":"Salvar treinamento"}
              </BtnPrimary>
              <BtnOutline onClick={()=>setTab("preview")} style={{padding:"10px 16px",fontSize:12}}>
                Ver prévia →
              </BtnOutline>
            </div>
          </>}

          {!segment && (
            <div style={{textAlign:"center",padding:"24px 0",color:C.text3,fontSize:13}}>
              Selecione o segmento do negócio para continuar a configuração
            </div>
          )}
        </>}

        {tab==="preview" && segment && <>
          <Card style={{marginBottom:14}}>
            <CardHd label={`Prévia interativa · ${assistant.type==="menu"&&assistant.useCustomName&&assistant.assistantName?assistant.assistantName:"Assistente"} · ${TONES.find(t=>t.id===tone)?.label}`}/>
            <p style={{fontSize:12,color:C.text3,marginBottom:14}}>Simule mensagens reais e veja como a IA vai responder com base no seu treinamento.</p>
            <PreviewChat answers={answers} tone={tone} assistantConfig={assistant}/>
          </Card>
          <BtnSecondary onClick={()=>setTab("config")}>← Voltar para configuração</BtnSecondary>
        </>}

        {tab==="preview" && !segment && (
          <div style={{textAlign:"center",padding:"40px 0",color:C.text3,fontSize:13}}>Configure o segmento antes de ver a prévia</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farol IA — CRM Interno</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease;}
</style>
</head>
<body>
<script>
// ── MOCK DATA ─────────────────────────────────────────────────────────────────
const MOCK = {

  mrrGrowth: 18,
  activeClients: 12,
  newThisWeek: 2,
  churnThisMonth: 0,
  trialClients: 3,
  apiCostMonth: 89,
  messagesMonth: 14832,
  leadsMonth: 287,
  conversionRate: 8.3,
  clients: [
    {id:"c1", name:"Ricardo Mendes",      business:"Clínica Estética Bella",    segment:"saude",      plan:"WhatsApp", price:197, status:"active",    since:"2025-01-15", messages:843, leads:34, nps:9.1, aiActive:true,  lastAccess:"hoje",       phone:"(11) 98765-4321", email:"ricardo@bellaforma.com", doc:"123.456.789-00"},
    {id:"c2", name:"Ana Paula Souza",     business:"Pet Shop Amigo Fiel",       segment:"servicos",   plan:"WhatsApp", price:97,  status:"trial",     since:"2025-01-18", messages:412, leads:18, nps:8.7, aiActive:true,  lastAccess:"ontem",      phone:"(11) 91234-5678", email:"ana@amigofiel.com",    doc:"234.567.890-11"},
    {id:"c3", name:"Marcos Teixeira",     business:"Oficina Teixeira",          segment:"servicos",   plan:"WhatsApp", price:197, status:"active",    since:"2025-01-10", messages:621, leads:22, nps:8.4, aiActive:true,  lastAccess:"hoje",       phone:"(51) 99876-5432", email:"marcos@teixeira.com",  doc:"345.678.901-22"},
    {id:"c4", name:"Juliana Costa",       business:"Restaurante Sabor & Arte",  segment:"restaurante",plan:"WhatsApp", price:197, status:"active",    since:"2025-01-08", messages:1240,leads:41, nps:9.3, aiActive:true,  lastAccess:"hoje",       phone:"(21) 98888-1234", email:"ju@saborarte.com",     doc:"456.789.012-33"},
    {id:"c5", name:"Pedro Almeida",       business:"Pedro Almeida Fotografia",  segment:"criativo",   plan:"WhatsApp", price:197, status:"active",    since:"2025-01-05", messages:389, leads:15, nps:8.9, aiActive:false, lastAccess:"3 dias",     phone:"(11) 97777-8888", email:"pedro@foto.com",       doc:"567.890.123-44"},
    {id:"c6", name:"Carla Rodrigues",     business:"Imobiliária Rodrigues",     segment:"imoveis",    plan:"WhatsApp", price:197, status:"active",    since:"2024-12-20", messages:978, leads:38, nps:8.2, aiActive:true,  lastAccess:"hoje",       phone:"(11) 96666-7777", email:"carla@rodrigues.com",  doc:"678.901.234-55"},
    {id:"c7", name:"Bruno Ferreira",      business:"Loja TrendShop",            segment:"varejo",     plan:"WhatsApp", price:197, status:"active",    since:"2024-12-15", messages:1432,leads:56, nps:9.0, aiActive:true,  lastAccess:"hoje",       phone:"(31) 95555-6666", email:"bruno@trend.com",      doc:"789.012.345-66"},

    {id:"c10",name:"Marina Oliveira",     business:"Confeitaria da Marina",     segment:"restaurante",plan:"WhatsApp", price:197, status:"active",    since:"2024-11-28", messages:892, leads:33, nps:9.2, aiActive:true,  lastAccess:"hoje",       phone:"(11) 92222-3333", email:"marina@confeit.com",   doc:"012.345.678-99"},
    {id:"c11",name:"Roberto Santos",      business:"Santos Elétrica",           segment:"servicos",   plan:"WhatsApp", price:197, status:"at_risk",   since:"2024-11-20", messages:124, leads:4,  nps:6.9, aiActive:true,  lastAccess:"12 dias",    phone:"(11) 91111-2222", email:"rob@santos.com",       doc:"111.222.333-44"},
    {id:"c12",name:"Tatiane Moura",       business:"Salão Moura Beauty",        segment:"saude",      plan:"WhatsApp", price:97,  status:"trial",     since:"2025-01-22", messages:98,  leads:5,  nps:null, aiActive:true, lastAccess:"hoje",       phone:"(11) 90000-1111", email:"tati@moura.com",       doc:"222.333.444-55"},
    {id:"c13",name:"Cláudio Barros",      business:"Barros Importados",         segment:"varejo",     plan:"WhatsApp", price:197, status:"cancelled", since:"2024-10-15", messages:234, leads:9,  nps:7.1, aiActive:false, lastAccess:"30 dias",    phone:"(11) 89999-0000", email:"cl@barros.com",        doc:"333.444.555-66", cancelledAt:"2025-01-10", cancelReason:"Preço"},
  ],
  weeklyMessages: [3200,2800,3600,4100,3847,4200,3600],
  weeklyLeads:    [48,42,55,61,58,64,52],
  weeklyNew:      [1,0,2,1,2,1,2],
  apiCosts:       [62,71,78,84,89,null,null],
};

const SEGMENTS = {saude:"🏥 Saúde",restaurante:"🍽️ Restaurante",varejo:"🛍️ Varejo",servicos:"🔧 Serviços",criativo:"🎨 Criativo",imoveis:"🏠 Imóveis"};
const STATUS_LABELS = {active:"Ativo",trial:"Trial",at_risk:"Em risco",cancelled:"Cancelado",suspended:"Suspenso"};
const STATUS_COLORS = {active:["rgba(34,197,94,.1)","#22c55e"],trial:["rgba(245,166,35,.1)","#f5a623"],at_risk:["rgba(239,68,68,.1)","#ef4444"],cancelled:["rgba(71,85,105,.1)","#475569"],suspended:["rgba(239,68,68,.1)","#ef4444"]};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentPage = "overview";
let selectedClient = null;
let clientFilter = "all";
let clientSearch = "";

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  document.body.innerHTML = `
    ${renderSidebar()}
    ${renderMain()}
  `;
  attachEvents();
}

function renderSidebar() {
  const navItems = [
    {id:"overview",  icon:overviewIcon(), label:"Visão geral"},
    {id:"clients",   icon:clientsIcon(),  label:"Clientes",  badge: MOCK.clients.filter(c=>c.status==="at_risk").length},
    {id:"financial", icon:finIcon(),      label:"Financeiro"},
    {id:"marketing", icon:mktIcon(),      label:"Marketing"},
    {id:"reports",   icon:repIcon(),      label:"Relatórios"},
    {id:"settings",  icon:settIcon(),     label:"Configurações"},
  ];
  return `
  <div style="width:220px;background:#141720;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;">
    <div style="display:flex;align-items:center;gap:10px;padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.07);">
      <div style="width:28px;height:28px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${farolSvg(14,18)}
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;color:#fff;">Farol IA</div>
        <div style="font-size:9px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;">Painel do Dono</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:1px;padding:10px 8px;flex:1;">
      ${navItems.map(n=>`
        <div onclick="nav('${n.id}')" style="display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:6px;cursor:pointer;transition:all .18s;background:${currentPage===n.id?"rgba(245,166,35,.12)":"none"};color:${currentPage===n.id?"#f5a623":"#94a3b8"};position:relative;">
          <span style="width:15px;height:15px;flex-shrink:0;opacity:${currentPage===n.id?1:.6};">${n.icon}</span>
          <span style="font-size:12px;font-weight:500;white-space:nowrap;">${n.label}</span>
          ${n.badge?`<span style="margin-left:auto;background:#ef4444;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;">${n.badge}</span>`:""}
          ${currentPage===n.id?`<div style="position:absolute;left:0;top:4px;bottom:4px;width:2px;background:#f5a623;border-radius:2px;"></div>`:""}
        </div>`).join("")}
    </div>
    <div style="padding:10px 8px;border-top:1px solid rgba(255,255,255,.07);">
      <div style="display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:6px;cursor:pointer;">
        <div style="width:26px;height:26px;border-radius:50%;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#f5a623;font-family:'DM Mono',monospace;">FF</div>
        <div>
          <div style="font-size:12px;font-weight:600;color:#e2e8f0;">Fernando Frare</div>
          <div style="font-size:10px;color:#475569;">Fundador · Farol IA</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderMain() {
  return `
  <div style="margin-left:220px;flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;">
    ${renderTopbar()}
    <div style="padding:22px;flex:1;" class="fade">
      ${currentPage==="overview"  ? renderOverview()  :
        currentPage==="clients"   ? renderClients()   :
        currentPage==="financial" ? renderFinancial() :
        currentPage==="marketing" ? renderMarketing() :
        currentPage==="reports"   ? renderReports()   :
        currentPage==="settings"  ? renderSettings()  :
        currentPage==="client_detail" ? renderClientDetail() : ""}
    </div>
  </div>`;
}

function renderTopbar() {
  const titles = {overview:"Visão geral",clients:"Clientes",financial:"Financeiro",marketing:"Marketing",reports:"Relatórios",settings:"Configurações",client_detail:"Perfil do Cliente"};
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:50px;background:#141720;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:50;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#475569;">
      <span>Farol IA</span><span>/</span>
      <span style="color:#e2e8f0;">${titles[currentPage]||""}</span>
      ${selectedClient&&currentPage==="client_detail"?`<span>/</span><span style="color:#e2e8f0;">${selectedClient.name}</span>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:5px;padding:5px 11px;font-size:11px;font-weight:600;color:#22c55e;">
        <div style="width:6px;height:6px;border-radius:50%;background:#22c55e;animation:spin 2s linear infinite;"></div>
        Sistema operacional
      </div>
      <div onclick="openWeeklyReport()" style="background:#1a1e2a;border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:5px 13px;font-size:11px;font-weight:600;color:#f5a623;cursor:pointer;">
        📊 Relatório semanal
      </div>
    </div>
  </div>`;
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview() {
  const atRisk = MOCK.clients.filter(c=>c.status==="at_risk");
  const trials = MOCK.clients.filter(c=>c.status==="trial");
  return `
  <!-- KPIs -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;margin-bottom:16px;">
    ${kpi("MRR","R$ "+MOCK.mrr.toLocaleString("pt-BR"),"+"+MOCK.mrrGrowth+"% vs mês anterior","up","💰")}
    ${kpi("Clientes ativos",MOCK.activeClients,"+"+MOCK.newThisWeek+" esta semana","up","👥")}
    ${kpi("Em trial",MOCK.trialClients,"Convertendo em "+Math.round(MOCK.trialClients/MOCK.activeClients*100)+"%","na","🧪")}
    ${kpi("Churn este mês",MOCK.churnThisMonth,"0% de cancelamento","up","📉")}
    ${kpi("Mensagens/mês",MOCK.messagesMonth.toLocaleString("pt-BR"),"Todas processadas pela IA","na","💬")}
    ${kpi("Custo de API","R$ "+MOCK.apiCostMonth,"Margem: "+Math.round((MOCK.mrr-MOCK.apiCostMonth)/MOCK.mrr*100)+"%","up","⚡")}
  </div>

  <!-- Alertas -->
  ${atRisk.length||trials.length?`
  <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
    ${atRisk.map(c=>`
    <div style="display:flex;align-items:center;gap:11px;background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px 14px;border-left:2px solid #ef4444;cursor:pointer;" onclick="openClient('${c.id}')">
      <div style="width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:600;color:#e2e8f0;">${c.name} — ${c.business}</div>
        <div style="font-size:11px;color:#475569;">Sem acesso há ${c.lastAccess} · NPS ${c.nps} · risco de churn</div>
      </div>
      <div style="font-size:11px;color:#ef4444;font-weight:600;">Ver perfil →</div>
    </div>`).join("")}
    ${trials.map(c=>`
    <div style="display:flex;align-items:center;gap:11px;background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px 14px;border-left:2px solid #f5a623;cursor:pointer;" onclick="openClient('${c.id}')">
      <div style="width:6px;height:6px;border-radius:50%;background:#f5a623;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:600;color:#e2e8f0;">${c.name} — ${c.business}</div>
        <div style="font-size:11px;color:#475569;">Trial · ${c.messages} mensagens · ${daysSince(c.since)} dias restantes para converter</div>
      </div>
      <div style="font-size:11px;color:#f5a623;font-weight:600;">Ver perfil →</div>
    </div>`).join("")}
  </div>`:""}

  <!-- Charts -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;">
    <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;">
      <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">Mensagens processadas — 7 dias</div>
      ${barChart(MOCK.weeklyMessages,["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"],"#f5a623")}
    </div>
    <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;">
      <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">Novos clientes — 7 dias</div>
      ${barChart(MOCK.weeklyNew,["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"],"#22c55e")}
    </div>
  </div>

  <!-- Top clientes -->
  <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;">
    <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">Top clientes — por volume de mensagens</div>
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:7px 11px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);">Cliente</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:7px 11px;text-align:right;border-bottom:1px solid rgba(255,255,255,.07);">Mensagens</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:7px 11px;text-align:right;border-bottom:1px solid rgba(255,255,255,.07);">Leads</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:7px 11px;text-align:right;border-bottom:1px solid rgba(255,255,255,.07);">NPS</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:7px 11px;text-align:right;border-bottom:1px solid rgba(255,255,255,.07);">Status</th>
      </tr></thead>
      <tbody>
        ${[...MOCK.clients].sort((a,b)=>b.messages-a.messages).slice(0,6).map(c=>`
        <tr onclick="openClient('${c.id}')" style="cursor:pointer;" onmouseover="this.style.background='#1a1e2a'" onmouseout="this.style.background='none'">
          <td style="padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.07);">
            <div style="font-size:12px;font-weight:600;color:#e2e8f0;">${c.name}</div>
            <div style="font-size:10px;color:#475569;">${c.business}</div>
          </td>
          <td style="padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.07);text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#e2e8f0;font-weight:600;">${c.messages.toLocaleString("pt-BR")}</td>
          <td style="padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.07);text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#22c55e;font-weight:600;">${c.leads}</td>
          <td style="padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.07);text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:${c.nps>=9?"#22c55e":c.nps>=7?"#f5a623":"#ef4444"};font-weight:600;">${c.nps||"—"}</td>
          <td style="padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.07);text-align:right;">${statusBadge(c.status)}</td>
        </tr>`).join("")}
      </tbody>
    </table>
  </div>`;
}

// ── CLIENTS ───────────────────────────────────────────────────────────────────
function renderClients() {
  const filters = [
    {id:"all",label:"Todos",count:MOCK.clients.length},
    {id:"active",label:"Ativos",count:MOCK.clients.filter(c=>c.status==="active").length},
    {id:"trial",label:"Trial",count:MOCK.clients.filter(c=>c.status==="trial").length},
    {id:"at_risk",label:"Em risco",count:MOCK.clients.filter(c=>c.status==="at_risk").length},
    {id:"cancelled",label:"Cancelados",count:MOCK.clients.filter(c=>c.status==="cancelled").length},
  ];
  const filtered = MOCK.clients.filter(c=>{
    if(clientFilter!=="all" && c.status!==clientFilter) return false;
    if(clientSearch && !c.name.toLowerCase().includes(clientSearch.toLowerCase()) && !c.business.toLowerCase().includes(clientSearch.toLowerCase())) return false;
    return true;
  });
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div style="display:flex;gap:4px;">
      ${filters.map(f=>`
      <button onclick="setFilter('${f.id}')" style="padding:6px 13px;background:${clientFilter===f.id?"rgba(245,166,35,.12)":"#141720"};border:1px solid ${clientFilter===f.id?"rgba(245,166,35,.25)":"rgba(255,255,255,.07)"};border-radius:5px;font-size:11px;font-weight:600;color:${clientFilter===f.id?"#f5a623":"#475569"};cursor:pointer;display:flex;align-items:center;gap:6px;">
        ${f.label} <span style="background:${clientFilter===f.id?"rgba(245,166,35,.2)":"rgba(255,255,255,.07)"};padding:1px 6px;border-radius:10px;font-size:10px;">${f.count}</span>
      </button>`).join("")}
    </div>
    <input id="clientSearch" value="${clientSearch}" oninput="searchClients(this.value)" placeholder="Buscar cliente..." style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:7px 12px;font-size:12px;color:#e2e8f0;outline:none;font-family:inherit;width:200px;"/>
  </div>
  <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);">Cliente</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);">Segmento</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.07);">Plano</th>
        <th style="font-size:10px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.07);">Mensagens</th>

// ── FINANCIAL ─────────────────────────────────────────────────────────────────
function renderFinancial() {
  const active = MOCK.clients.filter(c=>c.status==="active");
  const trial  = MOCK.clients.filter(c=>c.status==="trial");
  const mrr    = active.reduce((s,c)=>s+c.price,0) + trial.reduce((s,c)=>s+c.price,0);
  const projected = active.reduce((s,c)=>s+197,0); // todos no preço cheio

  return `
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px;margin-bottom:16px;">
    ${kpi("MRR atual","R$ "+mrr.toLocaleString("pt-BR"),"Receita recorrente mensal","up","💰")}
    ${kpi("MRR projetado","R$ "+projected.toLocaleString("pt-BR"),"Quando trials converterem","na","📈")}
    ${kpi("Custo API","R$ "+MOCK.apiCostMonth,"Este mês","na","⚡")}
    ${kpi("Margem bruta","R$ "+(mrr-MOCK.apiCostMonth-80).toLocaleString("pt-BR"),Math.round((mrr-MOCK.apiCostMonth-80)/mrr*100)+"% de margem","up","📊")}
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;">
    <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;">
      <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">Custo de API por cliente — este mês</div>
      ${MOCK.clients.filter(c=>c.status!=="cancelled").sort((a,b)=>b.messages-a.messages).map(c=>{
        const cost = Math.round(c.messages * 0.006);
        const margin = Math.round((c.price-cost)/c.price*100);
        return `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="flex:1;font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name}</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:#e2e8f0;flex-shrink:0;">R$${cost}</div>
          <div style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:${margin>80?"rgba(34,197,94,.1)":margin>60?"rgba(245,166,35,.1)":"rgba(239,68,68,.1)"};color:${margin>80?"#22c55e":margin>60?"#f5a623":"#ef4444"};flex-shrink:0;">${margin}%</div>
        </div>`;
      }).join("")}
    </div>

    <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;">
      <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">Receita por status</div>
      ${["active","trial"].map(st=>{
        const cls = MOCK.clients.filter(c=>c.status===st);
        const rev = cls.reduce((s,c)=>s+c.price,0);
        const pct = Math.round(rev/mrr*100);
        return `
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:11px;color:#94a3b8;">${STATUS_LABELS[st]} (${cls.length})</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:#e2e8f0;font-weight:600;">R$${rev} · ${pct}%</span>
          </div>
          <div style="height:6px;background:#1f2433;border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${st==="active"?"#f5a623":"#94a3b8"};border-radius:3px;"></div>
          </div>
        </div>`;
      }).join("")}
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.07);">
        <div style="font-size:10px;color:#475569;margin-bottom:4px;">Custo total estimado (API + infra)</div>
        <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:#ef4444;">R$ ${MOCK.apiCostMonth + 80}</div>
        <div style="font-size:10px;color:#22c55e;margin-top:4px;">Margem: R$ ${mrr - MOCK.apiCostMonth - 80} (${Math.round((mrr-MOCK.apiCostMonth-80)/mrr*100)}%)</div>
      </div>
    </div>
  </div>`;
}

      <button onclick="alert('Exportando PDF...')" style="flex:1;background:#1a1e2a;border:1px solid rgba(255,255,255,.07);color:#94a3b8;border-radius:6px;padding:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;">📄 Exportar PDF</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener("click", e => { if(e.target===modal) modal.remove(); });
}

function weeklyReportPreview() {
  return `
  <div style="background:#0f1117;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:11px;color:#94a3b8;line-height:2;">
    <div style="color:#f5a623;font-weight:700;margin-bottom:4px;">Farol IA · Semana 03</div>
    Clientes ativos:  <span style="color:#e2e8f0;">12 (+2)</span><br>
    MRR:              <span style="color:#22c55e;">R$ 2.364</span><br>
    Mensagens:        <span style="color:#e2e8f0;">3.847</span><br>
    Custo API:        <span style="color:#e2e8f0;">R$ 89</span><br>
    Margem:           <span style="color:#22c55e;">96%</span>
  </div>`;
}

function weeklyReportFull() {
  const active = MOCK.clients.filter(c=>c.status==="active"||c.status==="trial");
  const mrr = active.reduce((s,c)=>s+c.price,0);
  const msgs = MOCK.weeklyMessages.reduce((a,b)=>a+b,0);
  const margin = Math.round((mrr-MOCK.apiCostMonth-80)/mrr*100);
  return `
  <div style="display:flex;flex-direction:column;gap:10px;">
    <!-- Headline numbers -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
      ${[
        {label:"Clientes ativos",val:"12",delta:"+2",color:"#22c55e"},
        {label:"MRR",val:"R$ 2.364",delta:"+18%",color:"#22c55e"},
        {label:"Churn",val:"0",delta:"0%",color:"#22c55e"},
      ].map(m=>`
      <div style="background:#1a1e2a;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:12px;text-align:center;">
        <div style="font-size:11px;color:#475569;margin-bottom:4px;">${m.label}</div>
        <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:#fff;">${m.val}</div>
        <div style="font-size:10px;color:${m.color};margin-top:2px;">${m.delta}</div>
      </div>`).join("")}
    </div>

    <!-- Operational -->
    <div style="background:#1a1e2a;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:14px;">
      <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Operacional</div>
      ${[
        ["Mensagens processadas pela IA",msgs.toLocaleString("pt-BR"),"#e2e8f0"],
        ["Leads qualificados",MOCK.weeklyLeads.reduce((a,b)=>a+b,0).toString(),"#22c55e"],
        ["Custo total de API","R$ "+MOCK.apiCostMonth,"#e2e8f0"],
        ["Margem da semana",margin+"%","#22c55e"],
        ["Clientes em risco",MOCK.clients.filter(c=>c.status==="at_risk").length.toString(),"#ef4444"],
      ].map(([l,v,c])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);">
        <span style="font-size:12px;color:#94a3b8;">${l}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${c};">${v}</span>
      </div>`).join("")}
    </div>

    <!-- Alerts -->
    <div style="background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);border-radius:7px;padding:14px;">
      <div style="font-size:10px;font-weight:600;color:#ef4444;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">⚠️ Atenção necessária</div>
      <div style="font-size:12px;color:#94a3b8;line-height:1.8;">
        • Roberto Santos sem acesso há 12 dias — risco de churn<br>
        • Pedro Almeida com IA pausada há 3 dias<br>
        • 3 clientes em trial — follow-up recomendado
      </div>
    </div>

    <!-- Wins -->
    <div style="background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:7px;padding:14px;">
      <div style="font-size:10px;font-weight:600;color:#22c55e;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">✅ Destaques da semana</div>
      <div style="font-size:12px;color:#94a3b8;line-height:1.8;">
        • 2 novos clientes ativados (Ana Paula e Tatiane)<br>
        • Bruno Ferreira atingiu 1.400+ mensagens — maior volume<br>
        • Zero cancelamentos pelo 2º mês consecutivo<br>
        • Juliana Costa com NPS 9.3 — candidata a depoimento
      </div>
    </div>
  </div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function kpi(label,value,sub,trend,icon) {
  return `
  <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:14px;">
    <div style="font-size:10px;color:#475569;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;">${icon} ${label}</div>
    <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:#fff;line-height:1;margin-bottom:4px;">${value}</div>
    <div style="font-size:11px;font-weight:600;color:${trend==="up"?"#22c55e":trend==="dn"?"#ef4444":"#475569"};">${sub}</div>
  </div>`;
}

function kpiSmall(label,value,icon) {
  return `
  <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:12px;text-align:center;">
    <div style="font-size:16px;margin-bottom:4px;">${icon}</div>
    <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:#fff;margin-bottom:2px;">${value}</div>
    <div style="font-size:10px;color:#475569;font-weight:600;">${label}</div>
  </div>`;
}

function statusBadge(status) {
  const [bg,color] = STATUS_COLORS[status]||["rgba(71,85,105,.1)","#475569"];
  return `<span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;background:${bg};color:${color};display:inline-flex;align-items:center;gap:4px;"><span style="width:5px;height:5px;border-radius:50%;background:${color};"></span>${STATUS_LABELS[status]||status}</span>`;
}

function infoRow(label,value) {
  return `
  <div style="background:#1a1e2a;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:10px 12px;">
    <div style="font-size:9px;font-weight:600;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;">${label}</div>
    <div style="font-size:12px;color:#e2e8f0;font-weight:500;">${value}</div>
  </div>`;
}

function actionBtn(icon,label,desc,color) {
  return `
  <div style="display:flex;align-items:center;gap:10px;padding:9px 10px;background:#1a1e2a;border:1px solid rgba(255,255,255,.07);border-radius:6px;cursor:pointer;margin-bottom:7px;transition:border-color .15s;" onmouseover="this.style.borderColor='rgba(245,166,35,.25)'" onmouseout="this.style.borderColor='rgba(255,255,255,.07)'">
    <span style="font-size:16px;">${icon}</span>
    <div style="flex:1;">
      <div style="font-size:12px;font-weight:600;color:${color};">${label}</div>
      <div style="font-size:10px;color:#475569;">${desc}</div>
    </div>
  </div>`;
}

function barChart(data,labels,color) {
  const max = Math.max(...data.filter(Boolean));
  return `
  <div style="display:flex;align-items:flex-end;gap:5px;height:90px;">
    ${data.map((v,i)=>`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div style="width:100%;background:${v?`${color}33`:color+"11"};border-radius:3px 3px 0 0;height:${v?Math.round((v/max)*80):4}px;${v?"":"opacity:.3"}"></div>
    </div>`).join("")}
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:5px;">
    ${labels.map(l=>`<span style="font-size:9px;color:#475569;font-family:'DM Mono',monospace;">${l}</span>`).join("")}
  </div>`;
}

function settingsCard(title,rows) {
  return `
  <div style="background:#141720;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;">
    <div style="font-size:10px;font-weight:600;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">${title}</div>
    ${rows.map(r=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);">
      <span style="font-size:12px;color:#94a3b8;">${r.label}</span>
      <span style="font-size:12px;color:#e2e8f0;font-weight:600;">${r.value}</span>
    </div>`).join("")}
  </div>`;
}

function daysSince(dateStr) {
  const diff = Math.floor((new Date()-new Date(dateStr))/(1000*60*60*24));
  return Math.max(0, 30-diff);
}

// ── ICONS ─────────────────────────────────────────────────────────────────────
function farolSvg(w,h) {
  return `<svg viewBox="0 0 36 46" fill="none" width="${w}" height="${h}"><rect x="15" y="20" width="6" height="18" rx="3" fill="#f5a623" opacity=".4"/><rect x="8" y="13" width="20" height="9" rx="4" fill="#f5a623" opacity=".7"/><path d="M18 3 Q28 13 8 13 Q18 13 18 3Z" fill="#f5a623"/><path d="M18 3 Q8 13 28 13 Q18 13 18 3Z" fill="#f5a623" opacity=".7"/><circle cx="18" cy="8" r="3.5" fill="#f5a623"/></svg>`;
}
const icon = (d) => `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="${d}"/></svg>`;
const overviewIcon = () => icon("M2 6L8 2l6 4v8H2V6z");
const clientsIcon  = () => icon("M11 7a3 3 0 11-6 0 3 3 0 016 0zM3 14c0-3 2-5 5-5s5 2 5 5");
const finIcon      = () => icon("M2 12l4-4 3 3 5-7");
const mktIcon      = () => icon("M14 2L2 8l4 2 2 4 6-12z");
const repIcon      = () => icon("M3 12V4a1 1 0 011-1h5l4 4v5a1 1 0 01-1 1H4a1 1 0 01-1-1z M9 3v4h4");
const settIcon     = () => icon("M8 6a2 2 0 100 4 2 2 0 000-4z M2 8a6 6 0 1112 0A6 6 0 012 8z");

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents() {}

function nav(page) {
  currentPage = page;
  if(page !== "client_detail") selectedClient = null;
  render();
}

function openClient(id) {
  selectedClient = MOCK.clients.find(c=>c.id===id);
  currentPage = "client_detail";
  render();
}

function setFilter(f) {
  clientFilter = f;
  render();
}

function searchClients(val) {
  clientSearch = val;
  render();
}

// ── NAVIGATION EXTRAS ─────────────────────────────────────────────────────────
function goToClientDash() { window.open('farol-dashboard.html','_blank'); }
function goToLanding()    { window.location.href='farol-ia-landing.html'; }

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
